<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#132030"/>
      <stop offset="100%" stop-color="#0b1620"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4750"/>
      <stop offset="100%" stop-color="#1e262b"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="480" rx="18" fill="url(#bg)"/>

  <!-- ============ LEFT LAPTOP : ARCHITECTURE DESIGN ============ -->
  <g transform="translate(60,150)">
    <!-- laptop base -->
    <rect x="0" y="190" width="270" height="14" rx="4" fill="#4b5a63"/>
    <polygon points="10,190 260,190 245,204 25,204" fill="#33404a"/>
    <!-- laptop screen -->
    <rect x="15" y="10" width="240" height="182" rx="10" fill="#12181c" stroke="#58A6FF" stroke-width="2"/>
    <rect x="26" y="22" width="218" height="158" rx="4" fill="url(#screenGlow)"/>

    <!-- header label -->
    <text x="135" y="42" text-anchor="middle" fill="#58A6FF" font-family="Fira Code, monospace" font-size="11" font-weight="bold">ARCHITECTURE.drawio</text>

    <!-- cloud icon -->
    <g transform="translate(105,55)">
      <ellipse cx="30" cy="18" rx="26" ry="14" fill="#58A6FF" opacity="0.9"/>
      <ellipse cx="14" cy="20" rx="14" ry="10" fill="#58A6FF" opacity="0.9"/>
      <ellipse cx="46" cy="20" rx="14" ry="10" fill="#58A6FF" opacity="0.9"/>
    </g>

    <!-- connecting lines animated -->
    <path id="lineA" d="M135,85 L75,120" stroke="#7ee787" stroke-width="2" fill="none" stroke-dasharray="6 5">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path id="lineB" d="M135,85 L135,120" stroke="#7ee787" stroke-width="2" fill="none" stroke-dasharray="6 5">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path id="lineC" d="M135,85 L195,120" stroke="#7ee787" stroke-width="2" fill="none" stroke-dasharray="6 5">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.4s" repeatCount="indefinite"/>
    </path>

    <!-- infra nodes -->
    <g font-family="Fira Code, monospace" font-size="9" fill="#e6edf3">
      <rect x="48" y="120" width="54" height="30" rx="5" fill="#21262d" stroke="#58A6FF"/>
      <text x="75" y="139" text-anchor="middle">LB</text>

      <rect x="108" y="120" width="54" height="30" rx="5" fill="#21262d" stroke="#58A6FF"/>
      <text x="135" y="139" text-anchor="middle">API</text>

      <rect x="168" y="120" width="54" height="30" rx="5" fill="#21262d" stroke="#58A6FF"/>
      <text x="195" y="139" text-anchor="middle">DB</text>
    </g>

    <!-- blinking pen cursor to suggest "designing" -->
    <circle cx="195" cy="150" r="4" fill="#f0883e">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============ RIGHT MONITOR : EXECUTION / TERMINAL ============ -->
  <g transform="translate(580,110)">
    <!-- monitor stand -->
    <rect x="120" y="222" width="20" height="30" fill="#4b5a63"/>
    <rect x="80" y="250" width="100" height="10" rx="4" fill="#33404a"/>
    <!-- monitor screen -->
    <rect x="0" y="0" width="260" height="222" rx="10" fill="#12181c" stroke="#7ee787" stroke-width="2"/>
    <rect x="12" y="12" width="236" height="198" rx="4" fill="url(#screenGlow)"/>

    <!-- terminal dots -->
    <circle cx="26" cy="26" r="4" fill="#f85149"/>
    <circle cx="40" cy="26" r="4" fill="#f0883e"/>
    <circle cx="54" cy="26" r="4" fill="#7ee787"/>

    <g font-family="Fira Code, monospace" font-size="10.5" fill="#7ee787">
      <text x="22" y="52">$ terraform init</text>
      <text x="22" y="52" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.01;0.05;1" dur="6s" repeatCount="indefinite"/>
      </text>

      <text x="22" y="72" opacity="0">$ terraform apply
        <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.2;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <text x="22" y="92" fill="#58A6FF" opacity="0">Plan: 12 to add, 0 to change
        <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.4;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <text x="22" y="112" opacity="0">$ kubectl apply -f deploy.yaml
        <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.55;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <text x="22" y="132" fill="#7ee787" opacity="0">deployment.apps/api created
        <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.7;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <text x="22" y="152" fill="#7ee787" opacity="0">✔ pipeline passed
        <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.85;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <rect x="22" y="160" width="7" height="12" fill="#7ee787">
        <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ============ DESK ============ -->
  <rect x="30" y="352" width="840" height="18" rx="6" fill="url(#deskGrad)"/>

  <!-- ============ FORMAL PERSON (centered, seated) ============ -->
  <g transform="translate(450,330)">
    <!-- chair back -->
    <rect x="-70" y="-70" width="140" height="150" rx="26" fill="#1b2530"/>

    <!-- legs / lower body under desk (subtle) -->
    <rect x="-46" y="60" width="92" height="40" rx="14" fill="#22303c"/>

    <!-- torso: blazer -->
    <path d="M -62,60 C -62,0 -40,-38 0,-38 C 40,-38 62,0 62,60 Z" fill="#22303c"/>
    <!-- shirt -->
    <path d="M -18,-30 L 0,-6 L 18,-30 L 14,-36 L 0,-16 L -14,-36 Z" fill="#eef3f8"/>
    <!-- tie -->
    <polygon points="-4,-30 4,-30 7,-4 0,10 -7,-4" fill="#58A6FF"/>
    <!-- blazer lapels -->
    <path d="M -18,-30 L -46,10 L -20,4 Z" fill="#182029"/>
    <path d="M 18,-30 L 46,10 L 20,4 Z" fill="#182029"/>

    <!-- neck -->
    <rect x="-9" y="-46" width="18" height="16" rx="6" fill="#caa27a"/>
    <!-- head -->
    <circle cx="0" cy="-64" r="26" fill="#e2b993"/>
    <!-- short hair -->
    <path d="M -26,-70 C -26,-92 26,-92 26,-70 C 26,-84 16,-90 0,-90 C -16,-90 -26,-84 -26,-70 Z" fill="#2b2118"/>
    <path d="M -26,-66 C -28,-58 -26,-50 -22,-46 C -25,-58 -24,-66 -22,-72 Z" fill="#2b2118"/>
    <path d="M 26,-66 C 28,-58 26,-50 22,-46 C 25,-58 24,-66 22,-72 Z" fill="#2b2118"/>

    <!-- calm smile + eyes -->
    <circle cx="-9" cy="-64" r="2" fill="#1b140d"/>
    <circle cx="9" cy="-64" r="2" fill="#1b140d"/>
    <path d="M -8,-54 Q 0,-49 8,-54" stroke="#7a4a2e" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- arms reaching to each screen, alternating focus -->
    <path d="M -55,10 C -110,10 -140,-10 -170,-30" stroke="#22303c" stroke-width="18" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0.4;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M 55,10 C 110,10 140,-10 170,-30" stroke="#22303c" stroke-width="18" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="6s" repeatCount="indefinite"/>
    </path>
    <circle cx="-172" cy="-32" r="10" fill="#e2b993"/>
    <circle cx="172" cy="-32" r="10" fill="#e2b993"/>
  </g>

  <!-- caption -->
  <text x="450" y="452" text-anchor="middle" fill="#9fb3c8" font-family="Fira Code, monospace" font-size="14">
    Design the infrastructure. Then ship it.
  </text>
</svg>
